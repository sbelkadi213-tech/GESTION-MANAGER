<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestion Transmission CT1 - Oran</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #eef2f7; margin: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .main-card { background: white; width: 90%; max-width: 500px; padding: 30px; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); border-top: 6px solid #0056b3; text-align: center; }
        h1 { color: #0056b3; font-size: 22px; margin-bottom: 10px; }
        .status-badge { background: #d4edda; color: #155724; padding: 5px 15px; border-radius: 20px; font-weight: bold; font-size: 14px; display: inline-block; margin-bottom: 20px; }
        p { color: #4a5568; line-height: 1.6; }
        .btn { background: #0056b3; color: white; border: none; padding: 12px 25px; border-radius: 6px; cursor: pointer; font-size: 16px; text-decoration: none; display: inline-block; margin-top: 15px; }
        .footer { margin-top: 25px; font-size: 12px; color: #a0aec0; border-top: 1px solid #edf2f7; padding-top: 15px; }
    </style>
</head>
<body>
    <div class="main-card">
        <h1>Plateforme Transmission Oran</h1>
        <div class="status-badge">● SYSTÈME EN LIGNE</div>
        <p>Bienvenue sur l'interface de suivi du <strong>CT1</strong>. Ce programme permet de centraliser les données de maintenance des sites.</p>
        <button class="btn" onclick="alert('Liaison avec le serveur établie')">Accéder aux données</button>
        <div class="footer">Direction Opérationnelle des Télécommunications d’Oran - 2026</div>
    </div>
</body>
</html>
